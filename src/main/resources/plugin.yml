name: actualAuction
version: 1.1.0
main: me.angelique.actualAuction.ActualAuction
api-version: '1.21'
authors: [Angelique]
description: Chest GUI auction house with real bidding, Vault, and SQLite persistence.
softdepend: [Vault, AngelNCore]
commands:
  auction:
    description: Open the auction house.
    usage: /auction
    aliases: [ah]
permissions:
  actualauction.use:
    default: true
  actualauction.admin:
    default: op
